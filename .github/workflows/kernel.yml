name: Build Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "内核版本号（如：7.1）"
        required: true
        default: "7.1"

permissions:
  contents: write

jobs:
  build:
    name: "Build Kernel ${{ github.event.inputs.kernel_version }}"
    runs-on: ubuntu-24.04-arm
    steps:
      - name: "检出代码"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: "准备 ccache 编译缓存"
        uses: actions/cache@v4
        id: cache-ccache
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-ccache-unified-kernel-${{ github.event.inputs.kernel_version }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-ccache-unified-kernel-${{ github.event.inputs.kernel_version }}-
            ${{ runner.os }}-ccache-unified-kernel-

      - name: "安装构建工具并配置 ccache"
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libssl-dev libelf-dev bc ccache clang llvm lld wget xz-utils

          mkdir -p /home/runner/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=cache_dir=/home/runner/.ccache
          ccache --set-config=sloppiness=file_macro,locale,time_macros

      - name: "编译内核"
        id: build
        run: |
          export CCACHE_DIR=/home/runner/.ccache
          export CCACHE_MAXSIZE=10G
          export PATH="/usr/lib/ccache:$PATH"
          chmod +x sheng-kernel_build.sh
          bash sheng-kernel_build.sh "${{ github.event.inputs.kernel_version }}"
          ccache --show-stats || true

      - name: "统计编译产物"
        id: collect_artifacts
        run: |
          PKG_COUNT=$(ls -1 *.deb 2>/dev/null | wc -l)
          echo "共找到 $PKG_COUNT 个 Debian 包文件"
          echo "pkg_count=$PKG_COUNT" >> "$GITHUB_OUTPUT"

      - name: "上传内核配置"
        uses: actions/upload-artifact@v4
        with:
          name: generated-config
          path: sm8550.config

      - name: "上传系统驱动包（.deb）"
        uses: actions/upload-artifact@v4
        with:
          name: unified-kernel-debs-${{ github.event.inputs.kernel_version }}
          path: "*.deb"
          retention-days: 7
          if-no-files-found: error

      - name: "上传启动镜像（boot.img）"
        uses: actions/upload-artifact@v4
        with:
          name: boot_images
          path: |
            boot_sheng_singleboot.img
            boot_sheng_dualboot.img

      - name: "发布 GitHub Release"
        if: steps.collect_artifacts.outputs.pkg_count > 0 && github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kernel-${{ github.event.inputs.kernel_version }}
          name: "Kernel ${{ github.event.inputs.kernel_version }}"
          body: |
            **Kernel ${{ github.event.inputs.kernel_version }}** for Xiaomi Pad 6S Pro (sheng)
          draft: false
          prerelease: false
          files: |
            *.deb
            *.img
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
