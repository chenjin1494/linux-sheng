name: Build Kernel Bundle

on:
  workflow_run:
    workflows: ["Build Kernel"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "内核版本号（如：7.1）"
        required: true
        default: "7.1"

jobs:
  bundle:
    name: "Build Kernel Bundle ${{ github.event.inputs.kernel_version }}"
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: "检出代码"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 下载 Source Releases
        run: |
          mkdir bundle && cd bundle

          echo "⬇️ Download kernel packages"
          gh release download "kernel-7.1" \
            --pattern "*.deb" \
            --repo "${{ github.repository }}" \
            --clobber || true

          echo "⬇️ Download sheng_devauth"
          gh release download "sheng_devauth" \
            --pattern "*.deb" \
            --repo "${{ github.repository }}" \
            --clobber || true

          echo "⬇️ Download sensor"
          gh release download "sensor" \
            --pattern "*.deb" \
            --repo "${{ github.repository }}" \
            --clobber || true

          echo "📂 Final bundle:"
          ls -lah

          COUNT=$(ls *.deb 2>/dev/null | wc -l)
          if [ "$COUNT" -lt 5 ]; then
            echo "❌ Not enough packages"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "发布 GitHub Release"
        uses: softprops/action-gh-release@v1
        with:
          tag_name: kernel-bundle-${{ github.event.inputs.kernel_version }}
          name: "Kernel Bundle ${{ github.event.inputs.kernel_version }}"
          body: |
            **Kernel Bundle ${{ github.event.inputs.kernel_version }}** for Xiaomi Pad 6S Pro (sheng)
          draft: false
          prerelease: false
          files: bundle/*.deb
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
